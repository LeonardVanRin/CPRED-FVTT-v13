patterns:
  - "*.json"
  - "*.yaml"
  - "*.yml"
outputFormat: json
# Schemas in schema/ are generated from the Foundry DataModels by
# `npm run generate-schemas`. Effects/results/pages are embedded in their parent
# document and validated there, so they have no standalone entries here.
customCatalog:
  schemas:
    - name: "Ammo"
      description: "Schema for validating Ammo YAML fragments"
      fileMatch: ["src/packs/**/**/ammo.*.yaml"]
      location: "schema/ammo.json"
    - name: "Armor"
      description: "Schema for validating Armor YAML fragments"
      fileMatch: ["src/packs/**/**/armor.*.yaml"]
      location: "schema/armor.json"
    - name: "Clothing"
      description: "Schema for validating Clothing YAML fragments"
      fileMatch: ["src/packs/**/**/clothing.*.yaml"]
      location: "schema/clothing.json"
    - name: "Critical Injuries"
