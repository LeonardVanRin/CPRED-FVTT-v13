      <p><strong>Primary Effect</strong></p>
      <p>Dose lasts 24 hours.</p>
      <ul>
        <li>
          The user rolls 2d6 Humanity Loss which is returned if they pass the
          Secondary Effect save
        </li>
        <li>The user ignores Seriously Wounded wound states for the duration</li>
      </ul>
      <p><strong>Secondary Effect (DV17)</strong></p>
      <p>
        When the dose wears off, the user rolls
        <strong>WILL + Resist Torture/Drugs + 1d10 against Secondary DV</strong>.
      </p>
      <ul>
        <li>On Fail Humanity loss is not returned</li>
        <li>Unless experiencing the primary effect, REF -2</li>
      </ul>
