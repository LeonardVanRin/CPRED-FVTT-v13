        <li>Dance</li>
        <li>Contortionist</li>
        <li>Conversation</li>
        <li>Human Perception</li>
        <li>Persuasion</li>
        <li>Acting</li>
      </ul>
      <p>GM will tell your when you crave more Smash. Roleplay accordingly.</p>
